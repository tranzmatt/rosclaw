<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RosBot — TurtleBot4 Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0c10;
    --surface:   #111420;
    --border:    #1e2535;
    --accent:    #00d4ff;
    --accent2:   #0088cc;
    --warn:      #ff6b35;
    --ok:        #00ff88;
    --muted:     #3a4560;
    --text:      #c8d6f0;
    --text-dim:  #5a6a8a;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 700px;
    margin: 0 auto;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(17,20,32,0.9);
    backdrop-filter: blur(10px);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -1px;
  }

  .logo-text {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Status indicators */
  .indicators {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .dot.ok { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  .dot.warn { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
  .dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Messages */
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 85%;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot  { align-self: flex-start; align-items: flex-start; }
  .msg.sys  { align-self: center; max-width: 100%; }

  .bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
  }

  .msg.user .bubble {
    background: var(--accent2);
    color: #fff;
    border-bottom-right-radius: 3px;
  }

  .msg.bot .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 3px;
  }

  .msg.sys .bubble {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 4px;
    width: 100%;
    text-align: center;
  }

  .msg.status .bubble {
    background: rgba(0,212,255,0.05);
    border-color: rgba(0,212,255,0.15);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
  }

  .msg.error .bubble {
    background: rgba(255,107,53,0.08);
    border-color: rgba(255,107,53,0.25);
    color: var(--warn);
    font-family: var(--mono);
    font-size: 12px;
  }

  .msg.transcription .bubble {
    background: rgba(0,255,136,0.06);
    border-color: rgba(0,255,136,0.2);
    color: var(--ok);
    font-family: var(--mono);
    font-size: 12px;
  }

  .timestamp {
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--mono);
    margin-top: 3px;
    padding: 0 2px;
  }

  /* Input area */
  footer {
    border-top: 1px solid var(--border);
    background: rgba(17,20,32,0.95);
    backdrop-filter: blur(10px);
    padding: 12px 16px;
    flex-shrink: 0;
  }

  /* Quick commands */
  .quick-cmds {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .quick-cmds::-webkit-scrollbar { display: none; }

  .qbtn {
    flex-shrink: 0;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .qbtn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.05);
  }
  .qbtn:active { transform: scale(0.96); }

  /* Input row */
  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 120px;
    transition: border-color 0.2s;
    line-height: 1.4;
  }
  #input:focus { border-color: var(--accent2); }
  #input::placeholder { color: var(--text-dim); }

  /* Buttons */
  .btn {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    font-size: 18px;
  }
  .btn:active { transform: scale(0.93); }

  #send-btn {
    background: var(--accent2);
    color: #fff;
  }
  #send-btn:hover { background: var(--accent); }
  #send-btn:disabled { background: var(--muted); cursor: not-allowed; opacity: 0.5; }

  #mic-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  #mic-btn:hover { border-color: var(--accent); color: var(--accent); }
  #mic-btn.recording {
    background: var(--warn);
    border-color: var(--warn);
    color: #fff;
    animation: micPulse 0.8s infinite;
  }
  #mic-btn.disabled { opacity: 0.3; cursor: not-allowed; }

  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,53,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(255,107,53,0); }
  }

  /* Stop button (shown while agent is working) */
  #stop-btn {
    background: rgba(255,107,53,0.15);
    border: 1px solid var(--warn);
    color: var(--warn);
    display: none;
  }
  #stop-btn.visible { display: flex; }
  #stop-btn:hover { background: var(--warn); color: #fff; }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-bottom-left-radius: 3px;
    width: fit-content;
  }
  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); background: var(--accent); }
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 40px;
  }

  .empty-state .robot-ascii {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.3;
    color: var(--border);
    margin-bottom: 8px;
  }

  .empty-state p {
    font-size: 13px;
    max-width: 280px;
  }

  .empty-state .hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">
      <div class="logo-icon">R4</div>
      <div>
        <div class="logo-text">RosBot</div>
        <div class="logo-sub">TurtleBot4 Control</div>
      </div>
    </div>
    <div class="indicators">
      <div class="indicator">
        <div class="dot" id="dot-ros"></div>
        <span>ROS2</span>
      </div>
      <div class="indicator">
        <div class="dot" id="dot-ws"></div>
        <span>WS</span>
      </div>
      <div class="indicator" id="voice-indicator" style="display:none">
        <div class="dot ok"></div>
        <span>Voice</span>
      </div>
    </div>
  </header>

  <div id="chat">
    <div class="empty-state" id="empty">
      <div class="robot-ascii">
   ___<br>
  |o o|<br>
  | ^ |<br>
  |___|<br>
   | |<br>
  _| |_
      </div>
      <p>Send a message to control your TurtleBot4 with natural language.</p>
      <div class="hint">Try: "go forward 1 meter" or "turn left 90 degrees"</div>
    </div>
  </div>

  <footer>
    <div class="quick-cmds">
      <button class="qbtn" onclick="quickCmd('go forward 1 meter')">▲ Forward</button>
      <button class="qbtn" onclick="quickCmd('go backward 1 meter')">▼ Backward</button>
      <button class="qbtn" onclick="quickCmd('turn left 90 degrees')">◀ Left</button>
      <button class="qbtn" onclick="quickCmd('turn right 90 degrees')">▶ Right</button>
      <button class="qbtn" onclick="quickCmd('stop')">■ Stop</button>
      <button class="qbtn" onclick="quickCmd('spin in a full circle')">↺ Spin</button>
      <button class="qbtn" onclick="quickCmd('what is your battery level?')">🔋 Battery</button>
      <button class="qbtn" onclick="quickCmd('where are you?')">📍 Position</button>
    </div>
    <div class="input-row">
      <textarea
        id="input"
        placeholder="Tell the robot what to do..."
        rows="1"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      ></textarea>
      <button class="btn" id="mic-btn" title="Hold to record" disabled>🎙</button>
      <button class="btn" id="stop-btn" title="Stop robot">⏹</button>
      <button class="btn" id="send-btn" title="Send (Enter)">↑</button>
    </div>
  </footer>

</div>

<script>
// ---------------------------------------------------------------------------
// WebSocket
// ---------------------------------------------------------------------------
let ws = null;
let wsReady = false;
let voiceEnabled = false;

function connectWS() {
  const url = `ws://${location.host}/ws`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    wsReady = true;
    setDot('dot-ws', 'ok');
  };

  ws.onclose = () => {
    wsReady = false;
    setDot('dot-ws', 'warn');
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    setDot('dot-ws', 'warn');
  };

  ws.onmessage = (ev) => {
    const data = JSON.parse(ev.data);
    handleServerMessage(data);
  };
}

function handleServerMessage(data) {
  removeTyping();

  switch (data.type) {
    case 'status':
      appendMsg('status', data.text);
      // Parse ROS connection status
      if (data.text.includes('Connected to TurtleBot4')) {
        setDot('dot-ros', 'ok');
      } else if (data.text.includes('Cannot reach')) {
        setDot('dot-ros', 'warn');
      }
      if (data.text.includes('Voice: enabled')) {
        voiceEnabled = true;
        document.getElementById('voice-indicator').style.display = 'flex';
        enableMic();
      }
      break;

    case 'reply':
      appendMsg('bot', data.text);
      setInputEnabled(true);
      break;

    case 'transcription':
      appendMsg('transcription', '🎙 "' + data.text + '"');
      showTyping();
      break;

    case 'error':
      appendMsg('error', '⚠ ' + data.text);
      setInputEnabled(true);
      break;
  }
}

// ---------------------------------------------------------------------------
// Status on load
// ---------------------------------------------------------------------------
fetch('/status').then(r => r.json()).then(s => {
  if (s.voice) {
    voiceEnabled = true;
    document.getElementById('voice-indicator').style.display = 'flex';
  }
  if (s.rosbridge) setDot('dot-ros', 'ok');
});

// ---------------------------------------------------------------------------
// Chat UI
// ---------------------------------------------------------------------------
const chat = document.getElementById('chat');
const empty = document.getElementById('empty');
let typingEl = null;

function appendMsg(role, text) {
  if (empty) empty.style.display = 'none';

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  div.appendChild(bubble);

  if (role === 'user' || role === 'bot') {
    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    div.appendChild(ts);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  if (typingEl) return;
  typingEl = document.createElement('div');
  typingEl.className = 'msg bot';
  typingEl.id = 'typing-indicator';
  typingEl.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(typingEl);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

// ---------------------------------------------------------------------------
// Sending messages
// ---------------------------------------------------------------------------
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const stopBtn = document.getElementById('stop-btn');
const micBtn  = document.getElementById('mic-btn');

function setInputEnabled(enabled) {
  inputEl.disabled = !enabled;
  sendBtn.disabled = !enabled;
  stopBtn.classList.toggle('visible', !enabled);
  if (enabled) inputEl.focus();
}

function sendText(text) {
  if (!text.trim() || !wsReady) return;
  appendMsg('user', text);
  showTyping();
  ws.send(JSON.stringify({ type: 'text', text }));
  setInputEnabled(false);
}

sendBtn.addEventListener('click', () => {
  const text = inputEl.value.trim();
  if (text) { sendText(text); inputEl.value = ''; autoResize(); }
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = inputEl.value.trim();
    if (text) { sendText(text); inputEl.value = ''; autoResize(); }
  }
});

// Stop button sends emergency stop
stopBtn.addEventListener('click', () => {
  ws.send(JSON.stringify({ type: 'text', text: 'stop' }));
  appendMsg('user', 'STOP');
  removeTyping();
  showTyping();
});

function quickCmd(cmd) {
  if (!wsReady) return;
  sendText(cmd);
}

// Auto-resize textarea
function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}
inputEl.addEventListener('input', autoResize);

// ---------------------------------------------------------------------------
// Voice recording
// ---------------------------------------------------------------------------
let mediaRecorder = null;
let audioChunks = [];
let recording = false;

function enableMic() {
  micBtn.disabled = false;
  micBtn.classList.remove('disabled');
}

micBtn.addEventListener('mousedown', startRecording);
micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
micBtn.addEventListener('mouseup', stopRecording);
micBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });
micBtn.addEventListener('mouseleave', () => { if (recording) stopRecording(); });

async function startRecording() {
  if (!voiceEnabled || recording) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];

    // Prefer webm/opus, fall back to whatever browser supports
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/webm')
        ? 'audio/webm'
        : '';

    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => { sendAudio(mimeType || 'audio/webm'); stream.getTracks().forEach(t => t.stop()); };
    mediaRecorder.start(100);

    recording = true;
    micBtn.classList.add('recording');
    micBtn.textContent = '⏹';
    setDot('dot-ws', 'active');
  } catch (e) {
    appendMsg('error', 'Microphone access denied.');
  }
}

function stopRecording() {
  if (!recording || !mediaRecorder) return;
  recording = false;
  mediaRecorder.stop();
  micBtn.classList.remove('recording');
  micBtn.textContent = '🎙';
  setDot('dot-ws', 'ok');
}

async function sendAudio(mimeType) {
  if (audioChunks.length === 0) return;
  const blob = new Blob(audioChunks, { type: mimeType });
  const reader = new FileReader();
  reader.onload = () => {
    const base64 = reader.result.split(',')[1];
    appendMsg('status', '🎙 Processing voice...');
    ws.send(JSON.stringify({ type: 'audio', audio: base64, mime: mimeType }));
    setInputEnabled(false);
    showTyping();
  };
  reader.readAsDataURL(blob);
}

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
function setDot(id, state) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('ok', 'warn', 'active');
  if (state) el.classList.add(state);
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
connectWS();
inputEl.focus();
</script>
</body>
</html>
